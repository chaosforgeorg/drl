name: DRL CI

on:
  push:
    branches: [ development ]
    tags: [ '0_*', '1_*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            short: win
          - os: ubuntu-22.04
            short: linux
          - os: macos-latest
            short: osx

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    steps:
      - name: Checkout DRL
        uses: actions/checkout@v5
        with:
          path: drl

      - name: Checkout fpcvalkyrie
        uses: actions/checkout@v5
        with:
          repository: chaosforgeorg/fpcvalkyrie
          ref: development
          path: fpcvalkyrie

      # ── Platform-specific dependency installation ──────────────────────

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco feature enable -n=allowGlobalConfirmation
          choco install lazarus innosetup zip

          # Locate 64-bit FPC binary directory
          $fpcBin = 'C:\lazarus\fpc\3.2.2\bin\x86_64-win64'
          if (-not (Test-Path $fpcBin)) {
            $ver = Get-ChildItem 'C:\lazarus\fpc' -Directory -ErrorAction SilentlyContinue |
                   Sort-Object Name -Descending | Select-Object -First 1
            if ($ver) {
              $try = Join-Path $ver.FullName 'bin\x86_64-win64'
              if (Test-Path $try) { $fpcBin = $try }
            }
          }
          if (-not (Test-Path $fpcBin)) { Write-Error "64-bit FPC bin not found under C:\lazarus\fpc"; exit 1 }

          $fpcRoot = Split-Path (Split-Path $fpcBin -Parent) -Parent
          $fpcBin | Out-File -FilePath $env:GITHUB_PATH -Append

          # Regenerate fpc.cfg so unit search paths are correct
          $fpcmkcfg = Join-Path $fpcBin 'fpcmkcfg.exe'
          if (-not (Test-Path $fpcmkcfg)) { Write-Error "fpcmkcfg.exe not found in $fpcBin"; exit 1 }
          $cfgPath = Join-Path $fpcBin 'fpc.cfg'
          if (Test-Path $cfgPath) { Remove-Item $cfgPath -Force }
          & $fpcmkcfg -d basepath="$fpcRoot" -o "$cfgPath"
          if (-not (Test-Path $cfgPath)) { Write-Error "Failed to generate fpc.cfg"; exit 1 }

          "PPC_CONFIG_PATH=$fpcBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "FPCDIR=$fpcRoot"         | Out-File -FilePath $env:GITHUB_ENV -Append

          # Add InnoSetup to PATH
          $isccDir = 'C:\Program Files (x86)\Inno Setup 6'
          if (Test-Path $isccDir) {
            $isccDir | Out-File -FilePath $env:GITHUB_PATH -Append
          }

          # lua5.1.exe lives in drl\bin after staging; add to PATH
          $luaDir = Join-Path $env:GITHUB_WORKSPACE 'drl\bin'
          $luaDir | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc zip libreadline-dev

          # Build Lua 5.1 from source (need lua5.1 CLI + liblua5.1.a for static linking)
          curl -fL https://www.lua.org/ftp/lua-5.1.5.tar.gz -o lua-5.1.5.tar.gz
          tar xzf lua-5.1.5.tar.gz
          cd lua-5.1.5
          make linux
          sudo make install INSTALL_TOP=/usr/local
          cd ..
          rm -rf lua-5.1.5 lua-5.1.5.tar.gz

          # Lua installs as 'lua', build system expects 'lua5.1'
          sudo ln -sf /usr/local/bin/lua /usr/local/bin/lua5.1

          # FPC's {$linklib lua5.1.a} looks for liblua5.1.a
          # Place in /usr/lib where FPC's linker search path includes by default
          if [ -f /usr/local/lib/liblua.a ]; then
            sudo cp /usr/local/lib/liblua.a /usr/lib/liblua5.1.a
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install fpc readline

          # Build Lua 5.1 from source (no Homebrew formula for lua@5.1)
          curl -fL https://www.lua.org/ftp/lua-5.1.5.tar.gz -o lua-5.1.5.tar.gz
          tar xzf lua-5.1.5.tar.gz
          cd lua-5.1.5
          make macosx
          sudo make install INSTALL_TOP=/usr/local
          cd ..
          rm -rf lua-5.1.5 lua-5.1.5.tar.gz

          # Lua installs as 'lua', build system expects 'lua5.1'
          sudo ln -sf /usr/local/bin/lua /usr/local/bin/lua5.1

          # FPC static linking needs liblua5.1.a
          # Homebrew FPC on ARM searches /opt/homebrew/lib, not /usr/local/lib
          if [ -f /usr/local/lib/liblua.a ]; then
            sudo cp /usr/local/lib/liblua.a /usr/local/lib/liblua5.1.a
            sudo cp /usr/local/lib/liblua.a /opt/homebrew/lib/liblua5.1.a 2>/dev/null || true
          fi

      # ── Stage Windows runtime libraries ────────────────────────────────

      - name: Stage runtime (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        working-directory: drl
        run: |
          if (Test-Path "ext\windows") {
            & "$env:SystemRoot\System32\robocopy.exe" ext\windows bin /E
            $code = $LASTEXITCODE
            if ($code -gt 3) { exit $code } else { $global:LASTEXITCODE = 0 }
          } else {
            Write-Error "drl\ext\windows not found"; exit 1
          }

      # ── Download audio assets (gitignored) ─────────────────────────────

      - name: Download audio assets
        shell: bash
        working-directory: drl
        run: |
          set -e
          base_url="https://drl.chaosforge.org"

          mkdir -p bin/data/drlhq/music bin/data/drlhq/sound
          mkdir -p bin/data/drllq/music bin/data/drllq/sound

          curl -fL "$base_url/music_hq.zip"  -o music_hq.zip
          curl -fL "$base_url/sound_hq.zip"  -o sound_hq.zip
          curl -fL "$base_url/music_lq.zip"  -o music_lq.zip
          curl -fL "$base_url/sound_lq.zip"  -o sound_lq.zip

          unzip -o music_hq.zip  -d bin/data/drlhq/music/
          unzip -o sound_hq.zip  -d bin/data/drlhq/sound/
          unzip -o music_lq.zip  -d bin/data/drllq/music/
          unzip -o sound_lq.zip  -d bin/data/drllq/sound/

          rm -f music_hq.zip sound_hq.zip music_lq.zip sound_lq.zip

      # ── Build packages ─────────────────────────────────────────────────

      - name: Build
        shell: bash
        working-directory: drl
        run: |
          set -e
          mkdir -p tmp pkg

          lua5.1 makefile.lua lq
          lua5.1 makefile.lua hq

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: drl
        run: |
          set -e
          lua5.1 makefile.lua installhq

      # ── Upload artifacts ───────────────────────────────────────────────

      - name: Collect packages
        id: packages
        shell: bash
        working-directory: drl
        run: |
          set -e
          mkdir -p dist

          # Zip / tar.gz packages produced by makefile.lua
          for f in drl-${{ matrix.short }}-*.zip drl-${{ matrix.short }}-*.tar.gz; do
            [ -f "$f" ] && cp "$f" dist/ || true
          done

          # Windows InnoSetup installer
          for f in pkg/drl-*.exe; do
            [ -f "$f" ] && cp "$f" dist/ || true
          done

          echo "--- dist contents ---"
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: drl-${{ matrix.short }}
          path: drl/dist/*
          if-no-files-found: error
          retention-days: 7

  # ── GitHub Release (tag pushes only) ─────────────────────────────────

  release:
    if: startsWith(github.ref, 'refs/tags/0_') || startsWith(github.ref, 'refs/tags/1_')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -laR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  # ── Nightly release (development pushes only) ────────────────────────

  nightly:
    if: github.ref == 'refs/heads/development'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: drl-win
          path: nightly

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: drl-linux
          path: nightly

      - name: Keep only LQ packages
        run: |
          cd nightly
          echo "--- before filter ---"
          ls -la

          # Remove everything that isn't an LQ package
          find . -maxdepth 1 -type f ! -name '*-lq.*' -delete

          # Rename to stable "nightly" filenames for permanent URLs
          for f in drl-win-*-lq.zip; do
            [ -f "$f" ] && mv "$f" drl-win-nightly-lq.zip
          done
          for f in drl-linux-*-lq.tar.gz; do
            [ -f "$f" ] && mv "$f" drl-linux-nightly-lq.tar.gz
          done

          echo "--- after filter ---"
          ls -la

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Latest development build from the `development` branch.
            Updated automatically on each push.

            **Downloads:**
            - [Windows LQ](https://github.com/${{ github.repository }}/releases/download/nightly/drl-win-nightly-lq.zip)
            - [Linux LQ](https://github.com/${{ github.repository }}/releases/download/nightly/drl-linux-nightly-lq.tar.gz)
          prerelease: true
          make_latest: false
          files: nightly/*
